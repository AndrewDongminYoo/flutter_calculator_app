name: license_check

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

on:
  pull_request:
    branches:
      - main
    paths:
      - pubspec.yaml
      - .github/workflows/license_check.yaml
  push:
    branches:
      - main
    paths:
      - pubspec.yaml
      - .github/workflows/license_check.yaml

jobs:
  build:
    if: ${{ !contains(fromJSON('["dependabot[bot]", "renovate[bot]", "snyk-bot", "allcontributors[bot]"]'), github.actor) }}
    defaults:
      run:
        working-directory: .

    runs-on: ubuntu-latest

    steps:
      - name: 📚 Git Checkout
        uses: actions/checkout@v6

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          cache-key: flutter-:os:-:channel:-:version:-:arch:-:hash:-${{ hashFiles('**/pubspec.lock') }}

      - name: 📦 Install Dependencies
        run: flutter pub get --no-example

      - name: 👨‍⚖️ Check licenses
        run: |
          dart pub global activate very_good_cli
          very_good packages check licenses --dependency-type="direct-main,transitive" --allowed="MIT,BSD-3-Clause,BSD-2-Clause,Apache-2.0"
